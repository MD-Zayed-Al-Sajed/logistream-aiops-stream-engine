global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: "kafka_exporter"
    static_configs:
      - targets: ["kafka-exporter:9308"]

  # Your custom metrics exporter (if running)
  - job_name: "logistream_metrics"
    static_configs:
      - targets: ["metrics:9105"]